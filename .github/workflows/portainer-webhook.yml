name: Portainer Webhook

on:
  push:
    branches:
      - stratosbot-landing-stack

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer stack redeploy webhook
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          URL="$(printf '%s' "$PORTAINER_WEBHOOK_URL" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          curl --fail --show-error --silent -X POST "$URL"
