server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index stratosbot.html;

    location = / {
        try_files /stratosbot.html =404;
    }

    location = /stratosbot.html {
        try_files /stratosbot.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /onboarding {
        return 302 /onboarding.html;
    }
    location / {
        try_files $uri $uri/ =404;
    }
}
