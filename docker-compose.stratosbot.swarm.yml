# StratosBot stack (Swarm) – frontend SaaS + landing.
# Onboarding: SUPABASE_URL e SUPABASE_ANON_KEY vêm do arquivo StratosBot/config.js (commitado no repositório).
# O container apenas serve os arquivos estáticos (stratosbot.html, onboarding.html, config.js).
version: "3.8"

services:
  stratosbot:
    image: ${STRATOSBOT_IMAGE:-polygonuser/stratosbot:latest}
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
      labels:
        - traefik.enable=true
        - traefik.docker.network=PolygonNetwork
        - traefik.http.routers.stratosbot-site.rule=Host(`stratosbot.stratostech.com.br`)
        - traefik.http.routers.stratosbot-site.entrypoints=web,websecure
        - traefik.http.routers.stratosbot-site.priority=10
        - traefik.http.routers.stratosbot-site.tls=true
        - traefik.http.routers.stratosbot-site.tls.certresolver=letsencryptresolver
        - traefik.http.routers.stratosbot-site.service=stratosbot-site
        - traefik.http.services.stratosbot-site.loadbalancer.server.port=80
        - traefik.http.services.stratosbot-site.loadbalancer.passHostHeader=1
        - traefik.http.routers.stratosbot-site-http.rule=Host(`stratosbot.stratostech.com.br`)
        - traefik.http.routers.stratosbot-site-http.entrypoints=web
        - traefik.http.routers.stratosbot-site-http.middlewares=stratosbot-site-redirect
        - traefik.http.middlewares.stratosbot-site-redirect.redirectscheme.scheme=https
        - traefik.http.middlewares.stratosbot-site-redirect.redirectscheme.permanent=true
    networks:
      - PolygonNetwork

networks:
  PolygonNetwork:
    external: true
    name: PolygonNetwork
