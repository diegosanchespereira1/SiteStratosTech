# Stack Swarm: n8n em queue mode (main + workers + Redis + Postgres)
#
# Uso: deploy como stack no Portainer (ou docker stack deploy).
# Variáveis obrigatórias (definir no Portainer ou .env do stack):
#   N8N_ENCRYPTION_KEY  - mesma chave no main e workers (gerar uma segura e guardar)
#   N8N_WEBHOOK_URL     - URL pública do n8n (ex: https://n8n.stratostech.com.br)
#   POSTGRES_PASSWORD   - senha do banco n8n (ou usar N8N_DB_PASSWORD)
#
# Opcional: N8N_BASE_URL, N8N_INGRESS_API_KEY (para webhook com auth).
# O Supabase (N8N_INGRESS_WEBHOOK_URL) deve apontar para: ${N8N_WEBHOOK_URL}/webhook/<path>
#
version: "3.8"

services:
  redis:
    image: redis:7-alpine
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    # Sem porta no host; só rede interna. Para senha: command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - PolygonNetwork

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:?Defina N8N_DB_PASSWORD ou POSTGRES_PASSWORD}
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n} -d ${N8N_DB_NAME:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - PolygonNetwork

  n8n-main:
    image: docker.n8n.io/n8nio/n8n:latest
    environment:
      NODE_ENV: production
      EXECUTIONS_MODE: queue
      # Redis (Bull queue)
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      # QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD:-}  # descomente se Redis tiver senha
      # Criptografia (obrigatório: mesma chave nos workers)
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Defina N8N_ENCRYPTION_KEY}
      # Postgres
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?Defina N8N_DB_PASSWORD}
      # URL pública (webhooks e callbacks)
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:?Defina N8N_WEBHOOK_URL}
      N8N_HOST: ${N8N_HOST:-0.0.0.0}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      GENERIC_TIMEZONE: ${N8N_GENERIC_TIMEZONE:-America/Sao_Paulo}
      # Opcional: auth no webhook de ingress (Supabase usa N8N_INGRESS_API_KEY)
      # N8N_INGRESS_API_KEY: ${N8N_INGRESS_API_KEY:-}
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      labels:
        - traefik.enable=true
        - traefik.docker.network=PolygonNetwork
        # UI + API + webhooks no mesmo host
        - traefik.http.routers.n8n-main.rule=Host(`${N8N_HOSTNAME:-n8n.stratostech.com.br}`)
        - traefik.http.routers.n8n-main.entrypoints=web,websecure
        - traefik.http.routers.n8n-main.priority=10
        - traefik.http.routers.n8n-main.tls=true
        - traefik.http.routers.n8n-main.tls.certresolver=letsencryptresolver
        - traefik.http.routers.n8n-main.service=n8n-main
        - traefik.http.services.n8n-main.loadbalancer.server.port=5678
        - traefik.http.services.n8n-main.loadbalancer.passHostHeader=1
        # Redirect HTTP -> HTTPS
        - traefik.http.routers.n8n-main-http.rule=Host(`${N8N_HOSTNAME:-n8n.stratostech.com.br}`)
        - traefik.http.routers.n8n-main-http.entrypoints=web
        - traefik.http.routers.n8n-main-http.middlewares=n8n-main-redirect
        - traefik.http.middlewares.n8n-main-redirect.redirectscheme.scheme=https
        - traefik.http.middlewares.n8n-main-redirect.redirectscheme.permanent=true
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    networks:
      - PolygonNetwork

  n8n-worker:
    image: docker.n8n.io/n8nio/n8n:latest
    # Concurrency padrão 10; para alterar: command: ["worker", "--concurrency=5"]
    command: ["worker"]
    environment:
      NODE_ENV: production
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      # QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Defina N8N_ENCRYPTION_KEY}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?Defina N8N_DB_PASSWORD}
      GENERIC_TIMEZONE: ${N8N_GENERIC_TIMEZONE:-America/Sao_Paulo}
      # Concorrência por worker (padrão 10; 5–10 é um bom range)
      # Ajuste via N8N_WORKER_CONCURRENCY se quiser
    deploy:
      mode: replicated
      replicas: ${N8N_WORKER_REPLICAS:-2}
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    networks:
      - PolygonNetwork

networks:
  PolygonNetwork:
    external: true
    name: PolygonNetwork

volumes:
  n8n_postgres_data:
